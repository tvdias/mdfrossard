# --------------------------------------------------------------------------------------
# NOTA DE MIGRAÇÃO:
# Este arquivo substitui o antigo `_config.yml` da raiz do projeto.
# Ao coloca-lo aqui em `source/_data/config.yml`, o Eleventy o lê de forma NATIVA (Global Data),
# disponibilizando todos esses dados na variável `config` automaticamente para os templates.
#
# TODO: Muitos destes campos são sobras da época em que o site rodava no Hexo (como deploy, AMP, etc).
# É recomendável fazer uma limpa neste arquivo no futuro, mantendo apenas as variávies 
# estritamente utilizadas pelos layouts atuais (por ex: title, url, timezone, author, etc).
# --------------------------------------------------------------------------------------

# Site
title: MD Odontologia
subtitle: Dentista Barra da Tijuca e Botafogo
description: Clinica MD Odontologia - Dentista no Rio de Janeiro. Mude seu Sorriso. 
keywords: dentista barra tijuca botafogo odontologia marcos davi frossard
author: Davi Heringer Frossard
language: pt_BR
timezone: America/Sao_Paulo

google_analytics: UA-34132526-1
fb_pixel: 266409860211711
fb_admins: 100001667267019
fb_app_id: MdFrossardOdontologia
google_plus: MDFrossardOdontologiaBarraRiodeJaneiro
twitter_id: MD_Odontologia
disqus_shortname: mdfrossard

# URL
url: https://mdfrossard.com.br
root: /
#permalink: blog/:year/:month/:day/:title/
permalink: :title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
include:
  - _redirects
skip_render: 
  - "*admin/*"
  - _redirects

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:
  
# Home page setting
index_generator:
  path: '/blog'
  per_page: 10
  order_by: -date
  
# Category & Tag
default_category: sem-categoria
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: mdfrossard

# Deployment
deploy:
  type:

sitemap:
  path: sitemap.xml

feed:
  type: atom
  path: atom.xml
  limit: 20

excerpt:
  depth: 1
  excerpt_excludes: []
  more_excludes: []
  hideWholePostExcerpts: true

generator_amp:
  templateDir:  themes/mdfrossard/amp
  assetDistDir: amp
  logo:
    path:   ../source/images/logo-150x60.png
    width:  90 # width <= 600px
    height: 36 # width <= 60px
  substituteTitleImage: 
    path:   sample/sample-substituteTitleImage.png
    width:  1024 # width >= 696px
    height: 800
  cssFilePath:      style.css        #(optional) Location of css or stylus or sass file to use
  templateFilePath: blog.ejs         #(optional) Location of ejs or pug template file to use
  theme:
    menu:
      Início: /
      Equipe: /equipe
      Estrutura: /estrutura
      Depoimentos: /depoimentos
      Biossegurança: /biosseguranca
      Informativos: /informativos
      "Implante Dentario": /tratamentos/implante-dentario
      Prótese: /tratamentos/protese
      Estética: /tratamentos/estetica-dos-dentes
      Periodontia: /tratamentos/periodontia
      Endodontia: /tratamentos/endodontia
      Ortodontia: /tratamentos/ortodontia
      "Prevenção e Manutenção": /tratamentos/prevencao-e-manutencao
      "Check Up Digital Preventivo": /tratamentos/check-up-digital-preventivo
      "Day Clinic": /day-clinic
      Localização: /localizacao
      Contato: /contato
      Blog: /blog
    facebook_app_id: MdFrossardOdontologia
    facebook_admins: 100001667267019
    share_button:
      twitter: true
      facebook: true
      google: true
    latests: false
    list_limts: 3
    authorLink:
      twitter_id: MD_Odontologia
      facebook_id: MdFrossardOdontologia
      youtube_channel: UC6AC1C8mze49D64rTY5BUyw
    google_analytics: UA-34132526-1
    fb_pixel: 266409860211711
    warningLog: true
    validateAMP: true
